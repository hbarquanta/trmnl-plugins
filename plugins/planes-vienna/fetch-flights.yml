name: Fetch Vienna Flights

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch from OpenSky
        id: fetch
        # exit code 28 = curl timeout → treat as soft failure, keep old data
        run: |
          HTTP=$(curl \
            --silent \
            --max-time 45 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --write-out "%{http_code}" \
            --output /tmp/flights_new.json \
            "https://opensky-network.org/api/states/all?lamin=47.3&lomin=14.5&lamax=49.1&lomax=18.3" \
          ) || true

          echo "http_code=$HTTP" >> "$GITHUB_OUTPUT"

          # Only replace stored JSON if we got a valid 200 response with content
          if [ "$HTTP" = "200" ] && [ -s /tmp/flights_new.json ]; then
            cp /tmp/flights_new.json plugins/planes-vienna/data/flights.json
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "✅ Fetched fresh flight data (HTTP $HTTP)"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Skipped update — HTTP $HTTP or empty response. Keeping existing data."
          fi

      - name: Commit & push (only when data changed)
        if: steps.fetch.outputs.updated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/planes-vienna/data/flights.json
          git diff --cached --quiet || git commit -m "chore: update Vienna flight data"
          git push

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* TRMNL X: 1872 × 1404 px · 4:3 · 16-level grayscale
     Title bar ~100 px → content fills the rest               */
  html, body { height: 100%; overflow: hidden; }

  .layout {
    height: calc(100% - 100px) !important;
    overflow: hidden !important;
    padding: 0 !important;
  }

  .pv-root {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #fff;
    overflow: hidden;
  }

  /* ═══ FLIGHT LIST ════════════════════════════════════════════════════ */
  .pv-list {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 24px 44px 0 44px;
    display: flex;
    flex-direction: column;
  }

  .pv-head {
    display: grid;
    grid-template-columns: 72px 1fr 164px 124px 560px 290px;
    gap: 22px;
    padding-bottom: 14px;
    border-bottom: 3px solid #111;
    flex-shrink: 0;
  }
  .pv-head > span {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.17em;
    text-transform: uppercase;
    color: #aaa;
  }

  .pv-row {
    display: grid;
    grid-template-columns: 72px 1fr 164px 124px 560px 290px;
    gap: 22px;
    padding: 13px 0;
    align-items: center;
    border-bottom: 1.5px solid #ebebeb;
    flex-shrink: 0;
  }
  .pv-row.gnd { opacity: 0.3; }

  .pv-i    { font-size: 26px; color: #ccc; text-align: right; }
  .pv-cs   { font-size: 52px; font-weight: 800; letter-spacing: 0.02em; color: #111;
              overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .pv-dir  { font-size: 44px; text-align: center; color: #444; line-height: 1; }
  .pv-orig { font-size: 30px; color: #777; letter-spacing: 0.03em; }

  .pv-alt-col { display: flex; flex-direction: column; gap: 7px; }
  .pv-bar     { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .pv-fill    { height: 100%; background: #333; border-radius: 4px; }
  .pv-alt-txt { font-size: 26px; color: #555; font-variant-numeric: tabular-nums; }

  .pv-spd { font-size: 32px; text-align: right; color: #444;
             font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* ═══ RADAR — BOTTOM ════════════════════════════════════════════════ */
  .pv-radar {
    flex: 0 0 auto;
    padding: 16px 20px 12px;
    border-top: 2px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #pv-svg {
    display: block;
    width: 100%;
    height: 370px;
  }

  .pv-rfooter {
    font-size: 20px;
    color: #bbb;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .pv-empty {
    padding: 80px 44px;
    font-size: 48px;
    color: #bbb;
    text-align: center;
  }
</style>

<div class="layout">
  <div class="pv-root">

    <!-- ═══ FLIGHT LIST ═══ -->
    <div class="pv-list">
      <div class="pv-head">
        <span>#</span>
        <span>Callsign</span>
        <span>Hdg / VS</span>
        <span>Orig</span>
        <span>Altitude</span>
        <span>Speed</span>
      </div>
      <div id="pv-rows"></div>
    </div>

    <!-- ═══ RADAR — BOTTOM CENTER ═══ -->
    <div class="pv-radar">
      <svg id="pv-svg" xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 1800 370" preserveAspectRatio="none">

        <!-- Geographic features: Donau, lakes, cities — built by JS -->
        <g id="pv-geo"></g>

        <!-- VIE airport — built by JS -->
        <g id="pv-vie"></g>

        <!-- Live plane markers — built by JS -->
        <g id="pv-planes"></g>

        <!-- Frame -->
        <rect x="1" y="1" width="1798" height="368"
              fill="none" stroke="#ccc" stroke-width="2"/>

        <!-- Edge region labels — human-readable instead of coordinates -->
        <text x="22"  y="22" font-size="15" font-family="inherit"
              fill="#bbb" font-style="italic">Linz</text>
        <text x="1778" y="22" font-size="15" font-family="inherit"
              fill="#bbb" font-style="italic" text-anchor="end">Budapest Region</text>
        <text x="900" y="19" font-size="14" font-family="inherit"
              fill="#bbb" text-anchor="middle" letter-spacing="0.05em">CZECH · SLOVAK BORDER</text>
        <text x="900" y="362" font-size="14" font-family="inherit"
              fill="#bbb" text-anchor="middle" letter-spacing="0.05em">GRAZ · STYRIA</text>
      </svg>

      <div class="pv-rfooter" id="pv-foot">
        Greater Vienna Airspace &nbsp;·&nbsp; Linz to Budapest
      </div>
    </div>

  </div>
</div>

<div class="title_bar">
  <img class="image" src="https://trmnl.com/images/plugins/trmnl--render.svg">
  <span class="title">Vienna Airspace</span>
  <span class="instance" id="pv-status">Loading…</span>
</div>

<script>
  const API = 'https://raw.githubusercontent.com/hbarquanta/trmnl-plugins/main/plugins/planes-vienna/data/flights.json';
  const MAX = 10;

  // Bounding box: ~150 km around Vienna
  // NOTE: expand the GitHub Action's OpenSky query to these same bounds for real data
  const LAT0 = 47.3, LAT1 = 49.1;
  const LON0 = 14.5, LON1 = 18.3;

  // Matches SVG viewBox="0 0 1800 370"
  const SW = 1800, SH = 370, PAD = 18;

  const VIE = { lat: 48.1103, lon: 16.5697 };

  // Sample data — used when live fetch is CORS-blocked in TRMNL preview
  const SAMPLE = { time: 1781908491, states: [
    ["3c7428","TUI36B  ","Germany", 0,0, 16.494, 48.187, 11582, false, 220, 308,  0.0, null, 12154],
    ["4caf26","RYR987  ","Ireland", 0,0, 16.532, 48.229,   777, false,  81, 164, -4.2, null,   914],
    ["4d22ca","RYR9WE  ","Malta",   0,0, 16.268, 48.315,  2118, false, 146,  75, -6.8, null,  2347],
    ["3c6745","AUA123  ","Austria", 0,0, 16.321, 48.150,  9144, false, 245, 265,  2.1, null,  9450],
    ["3944ef","EZY4532 ","United Kingdom", 0,0, 16.405, 48.295, 7620, false, 198, 190, -1.2, null, 7800],
    ["4b1801","SWR456  ","Switzerland", 0,0, 16.550, 48.080, 10668, false, 232, 45, 0.0, null, 10970],
    ["3c4b12","DLH789  ","Germany", 0,0, 16.190, 48.350,  6096, false, 178,  92,  3.5, null,  6300],
    ["4ca2b3","RYR3311 ","Ireland", 0,0, 16.620, 48.210,   914, false,  68, 210, -3.9, null,  1050],
    ["3d4f11","LH1842  ","Germany", 0,0, 15.820, 48.650, 11277, false, 242,  88,  0.0, null, 11500],
    ["406c23","BAW447  ","United Kingdom", 0,0, 17.120, 48.520, 9753, false, 188, 272, 1.8, null, 9900],
  ]};

  // ── coordinate mapping ──────────────────────────────────────────────

  function geo2svg(lat, lon) {
    return {
      x: PAD + ((lon - LON0) / (LON1 - LON0)) * (SW - 2 * PAD),
      y: PAD + ((LAT1 - lat) / (LAT1 - LAT0)) * (SH - 2 * PAD),
    };
  }

  // ── static geographic features ──────────────────────────────────────

  function buildGeoFeatures() {

    // Danube / Donau — key waypoints from west to east (approx.)
    // Wachau valley curves north then east; through Vienna; south past Bratislava to Hungary
    const DONAU = [
      [48.30, 14.50], // enters from west (near Linz)
      [48.23, 14.70],
      [48.22, 14.86], // Grein
      [48.22, 15.33], // Melk
      [48.37, 15.41], // Wachau — river curves north (Spitz)
      [48.40, 15.52], // Durnstein
      [48.41, 15.61], // Krems (northernmost point in Wachau)
      [48.36, 15.80], // bends south-east again
      [48.34, 15.95],
      [48.33, 16.06], // Tulln
      [48.31, 16.32], // Klosterneuburg
      [48.26, 16.41], // Vienna north bank
      [48.21, 16.52], // through Vienna
      [48.14, 16.80],
      [48.14, 17.12], // Bratislava
      [48.00, 17.50],
      [47.75, 17.80], // bends south toward Budapest
      [47.72, 18.10],
      [47.74, 18.30], // exits east
    ];

    const dPts = DONAU.map(([lat, lon]) => {
      const { x, y } = geo2svg(lat, lon);
      return `${x.toFixed(0)},${y.toFixed(0)}`;
    }).join(' ');

    // Neusiedler See — shallow lake SE of Vienna, elongated N-S
    // Extent approx 47.68–47.96°N, 16.70–16.84°E
    const { x: lc, y: lm } = geo2svg(47.82, 16.77);
    const { x: le } = geo2svg(47.82, 16.84);
    const { x: lw } = geo2svg(47.82, 16.70);
    const { y: ln } = geo2svg(47.96, 16.77);
    const { y: ls } = geo2svg(47.68, 16.77);
    const lrx = Math.max(6, ((le - lw) / 2)).toFixed(0);
    const lry = Math.max(6, ((ls - ln) / 2)).toFixed(0);

    // Danube label near Wachau peak
    const { x: dlx, y: dly } = geo2svg(48.47, 15.55);

    // City markers
    const CITIES = [
      { lat: 48.21, lon: 16.37, name: 'Wien',       main: true  },
      { lat: 48.15, lon: 17.11, name: 'Bratislava', main: false },
      { lat: 48.20, lon: 15.63, name: 'St. Pölten', main: false },
      { lat: 47.84, lon: 16.52, name: 'Eisenstadt', main: false },
      { lat: 48.41, lon: 15.61, name: 'Krems',      main: false },
    ];

    let h = '';

    // Donau river
    h += `<polyline points="${dPts}"
            fill="none" stroke="#bbb" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>`;

    // Donau label
    h += `<text x="${dlx.toFixed(0)}" y="${(dly - 6).toFixed(0)}"
            font-size="14" font-family="inherit" fill="#aaa"
            text-anchor="middle" font-style="italic">Donau</text>`;

    // Neusiedler See
    h += `<ellipse cx="${lc.toFixed(0)}" cy="${lm.toFixed(0)}"
            rx="${lrx}" ry="${lry}"
            fill="#e4e4e4" stroke="#ccc" stroke-width="1.5"/>`;
    h += `<text x="${lc.toFixed(0)}" y="${(lm + parseFloat(lry) + 14).toFixed(0)}"
            font-size="11" font-family="inherit" fill="#bbb"
            text-anchor="middle" font-style="italic">Neusiedler See</text>`;

    // City dots
    CITIES.forEach(({ lat, lon, name, main }) => {
      const { x, y } = geo2svg(lat, lon);
      const r    = main ? 7 : 4;
      const col  = main ? '#444' : '#888';
      const fs   = main ? 16 : 12;
      const fw   = main ? 'bold' : 'normal';
      const dx   = (x + r + 6).toFixed(0);
      const dy   = (y + 5).toFixed(0);
      h += `<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${r}" fill="${col}"/>`;
      h += `<text x="${dx}" y="${dy}" font-size="${fs}" font-family="inherit"
              fill="${col}" font-weight="${fw}">${name}</text>`;
    });

    document.getElementById('pv-geo').innerHTML = h;
  }

  function buildVIE() {
    const { x, y } = geo2svg(VIE.lat, VIE.lon);
    const X = x.toFixed(0), Y = y.toFixed(0);
    document.getElementById('pv-vie').innerHTML = `
      <line x1="${(x-11).toFixed(0)}" y1="${Y}" x2="${(x+11).toFixed(0)}" y2="${Y}"
            stroke="#555" stroke-width="2"/>
      <line x1="${X}" y1="${(y-11).toFixed(0)}" x2="${X}" y2="${(y+11).toFixed(0)}"
            stroke="#555" stroke-width="2"/>
      <circle cx="${X}" cy="${Y}" r="8"
              fill="none" stroke="#555" stroke-width="2.5"/>
      <text x="${(x+13).toFixed(0)}" y="${(y-7).toFixed(0)}"
            font-size="13" font-family="inherit" fill="#555" font-weight="bold">VIE</text>
    `;
  }

  // ── plane markers on radar ──────────────────────────────────────────

  function planeDot(s) {
    const [icao24, callsign, , , , lon, lat, , on_ground, , track] = s;
    if (lat == null || lon == null) return '';
    if (lat < LAT0 || lat > LAT1 || lon < LON0 || lon > LON1) return '';

    const { x, y } = geo2svg(lat, lon);
    const cs  = (callsign || icao24 || '?').trim().slice(0, 7);
    const ang = (track || 0).toFixed(0);

    if (on_ground) {
      return `<rect x="${(x-4).toFixed(0)}" y="${(y-4).toFixed(0)}" width="8" height="8" fill="#888"/>
              <text x="${(x+6).toFixed(0)}" y="${(y+4).toFixed(0)}"
                    font-size="10" font-family="inherit" fill="#888">${cs}</text>`;
    }

    return `<g transform="rotate(${ang} ${x.toFixed(0)} ${y.toFixed(0)})">
        <polygon points="${x.toFixed(0)},${(y-8).toFixed(0)} ${(x-5).toFixed(0)},${(y+5).toFixed(0)} ${x.toFixed(0)},${(y+3).toFixed(0)} ${(x+5).toFixed(0)},${(y+5).toFixed(0)}"
                 fill="#111"/>
        <line x1="${(x-8).toFixed(0)}" y1="${(y+1).toFixed(0)}"
              x2="${(x+8).toFixed(0)}" y2="${(y+1).toFixed(0)}"
              stroke="#111" stroke-width="1.2"/>
      </g>
      <text x="${(x+10).toFixed(0)}" y="${(y-6).toFixed(0)}"
            font-size="11" font-family="inherit" fill="#555">${cs}</text>`;
  }

  // ── helpers ─────────────────────────────────────────────────────────

  function hdgArrow(d) {
    if (d == null) return '–';
    return ['↑','↗','→','↘','↓','↙','←','↖'][Math.round(d / 45) % 8];
  }
  function vsIcon(v) {
    if (v == null) return '';
    return v > 0.5 ? '▲' : v < -0.5 ? '▼' : '◆';
  }
  function fmt(v, d = 0) { return (v == null || isNaN(v)) ? '–' : Number(v).toFixed(d); }
  function kmh(ms)        { return ms == null ? '–' : Math.round(ms * 3.6) + ''; }

  const CTRY = {
    'Germany':'GER','Austria':'AUT','Ireland':'IRL','United States':'USA',
    'United Kingdom':'GBR','France':'FRA','Netherlands':'NLD','Spain':'ESP',
    'Italy':'ITA','Switzerland':'CHE','Hungary':'HUN','Czech Republic':'CZE',
    'Slovakia':'SVK','Poland':'POL','Turkey':'TUR','Malta':'MLT',
    'Luxembourg':'LUX','Norway':'NOR','Sweden':'SWE','Belgium':'BEL',
    'Croatia':'HRV','Romania':'ROU','Bulgaria':'BGR','Serbia':'SRB',
  };
  function ctry(n) { return CTRY[n] || (n||'').slice(0,3).toUpperCase() || '—'; }

  // ── flight rows ──────────────────────────────────────────────────────

  function flightRow(s, i) {
    const [icao24, callsign, country, , , , , baro, on_ground, vel, track, vert_rate, , geo_alt] = s;
    const cs     = (callsign || icao24 || '???').trim();
    const alt    = geo_alt || baro;
    const altPct = on_ground ? 0 : Math.min(100, Math.max(0, ((alt||0) / 13000) * 100)).toFixed(1);
    const altStr = on_ground ? 'GND' : `${fmt(alt)} m`;
    const spdStr = on_ground ? '—' : `${kmh(vel)} km/h`;
    const dir    = on_ground ? 'GND' : `${hdgArrow(track)}${vsIcon(vert_rate)}`;

    return `<div class="pv-row${on_ground ? ' gnd' : ''}">
      <span class="pv-i">${i + 1}</span>
      <span class="pv-cs">${cs}</span>
      <span class="pv-dir">${dir}</span>
      <span class="pv-orig">${ctry(country)}</span>
      <div class="pv-alt-col">
        <div class="pv-bar"><div class="pv-fill" style="width:${altPct}%"></div></div>
        <span class="pv-alt-txt">${altStr}</span>
      </div>
      <span class="pv-spd">${spdStr}</span>
    </div>`;
  }

  // ── render ───────────────────────────────────────────────────────────

  function render(data, isSample) {
    const states   = data.states || [];
    const airborne = states.filter(s => !s[8]).sort((a,b) => (b[13]||b[7]||0) - (a[13]||a[7]||0));
    const grounded = states.filter(s =>  s[8]);
    const all      = [...airborne, ...grounded];

    document.getElementById('pv-planes').innerHTML = all.map(planeDot).join('');

    document.getElementById('pv-rows').innerHTML = all.length === 0
      ? '<div class="pv-empty">Clear skies over Vienna</div>'
      : all.slice(0, MAX).map(flightRow).join('');

    const ts   = data.time ? new Date(data.time * 1000) : new Date();
    const hhmm = ts.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' });
    const age  = Math.round((Date.now() / 1000 - (data.time || 0)) / 60);
    const note = isSample ? 'sample data' : age > 30 ? `data ${age}m old` : `updated ${hhmm}`;

    document.getElementById('pv-status').textContent =
      `${states.length} aircraft · ${airborne.length} airborne · ${note}`;
  }

  // ── fetch ────────────────────────────────────────────────────────────

  async function refresh() {
    try {
      const r = await fetch(API + '?_=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      render(await r.json(), false);
    } catch (_) {
      render(SAMPLE, true);
    }
  }

  buildGeoFeatures();
  buildVIE();
  refresh();
  setInterval(refresh, 60000);
</script>
